name: "🍎 macOS"

on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    
    steps:
      # 1. Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4
      
      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      # 3. Enable macOS desktop support
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      
      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get
      
      # 5. Generate Drift and Riverpod code
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      # 6. Build macOS release with secrets
      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      # 7. Zip the .app bundle
      - name: Create zip archive
        run: |
          zip -r Moonplex-macOS.zip "build/macos/Build/Products/Release/Moonplex.app"
      
      # 8. Upload artifact
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-macOS
          path: Moonplex-macOS.zip
          retention-days: 30
