name: "🌙 Build All — Moonplex Full Release"

on:
  workflow_dispatch:

description: >
  Builds all platforms simultaneously using parallel jobs.
  Use this when making a full release of Moonplex.
  Each job is independent and uploads its own artifact.
  All jobs run at the same time to save total build time.

jobs:
  # ==================== Android Debug ====================
  android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build APK
        run: |
          flutter build apk --debug \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-Android-Debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  # ==================== Android Release ====================
  android-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/moonplex.jks
      
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=moonplex.jks
          EOF
      
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-Android-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-Android-Release-AAB
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ==================== Android TV Debug ====================
  androidtv-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build APK
        run: |
          flutter build apk --debug \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/moonplex-tv-debug.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-AndroidTV-Debug
          path: build/app/outputs/flutter-apk/moonplex-tv-debug.apk
          retention-days: 30

  # ==================== Windows ====================
  windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build Windows
        run: |
          flutter build windows --release `
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} `
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} `
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Create zip archive
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Moonplex-Windows.zip
      
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-Windows
          path: Moonplex-Windows.zip
          retention-days: 30

  # ==================== Linux ====================
  linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            cmake \
            clang \
            libsecret-1-dev \
            libjsoncpp-dev \
            libsqlite3-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Create zip archive
        run: |
          zip -r Moonplex-Linux.zip build/linux/x64/release/bundle/
      
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-Linux
          path: Moonplex-Linux.zip
          retention-days: 30

  # ==================== macOS ====================
  macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          pub-cache-hash: true
      
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=CONFIG_URL=${{ secrets.CONFIG_URL }} \
            --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}
      
      - name: Create zip archive
        run: |
          zip -r Moonplex-macOS.zip "build/macos/Build/Products/Release/Moonplex.app"
      
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Moonplex-macOS
          path: Moonplex-macOS.zip
          retention-days: 30
