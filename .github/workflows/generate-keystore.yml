name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore password (min 6 characters)'
        required: true
        type: password
      key_alias:
        description: 'Key alias name'
        required: true
        default: 'syndro'
        type: string
      validity_years:
        description: 'Validity period in years'
        required: true
        default: '25'
        type: string

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Validate password
        run: |
          PASSWORD="${{ inputs.keystore_password }}"
          if [ ${#PASSWORD} -lt 6 ]; then
            echo "❌ Password must be at least 6 characters"
            exit 1
          fi
          echo "✅ Password validated"

      - name: Generate Keystore
        run: |
          # Use the password provided by user
          KEYSTORE_PASSWORD="${{ inputs.keystore_password }}"
          KEY_PASSWORD=$KEYSTORE_PASSWORD
          
          # Create keystore
          keytool -genkey -v \
            -keystore syndro-release.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity ${{ inputs.validity_years }}000 \
            -alias ${{ inputs.key_alias }} \
            -storepass $KEYSTORE_PASSWORD \
            -keypass $KEY_PASSWORD \
            -dname "CN=Syndro, OU=Development, O=Syndro, L=Unknown, ST=Unknown, C=US"
          
          # Encode to base64
          KEYSTORE_BASE64=$(base64 -w 0 syndro-release.jks)
          
          # Save to files for artifact upload
          echo "$KEYSTORE_BASE64" > keystore_base64.txt
          echo "$KEYSTORE_PASSWORD" > keystore_password.txt
          echo "${{ inputs.key_alias }}" > key_alias.txt
          
          # Output summary
          echo "=========================================="
          echo "KEYSTORE GENERATED SUCCESSFULLY!"
          echo "=========================================="
          echo ""
          echo "Add these values to GitHub Secrets:"
          echo "(Go to: Settings → Secrets → Actions → New repository secret)"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────────┐"
          echo "│ Secret Name          │ Value                                    │"
          echo "├─────────────────────────────────────────────────────────────────┤"
          echo "│ KEYSTORE_BASE64      │ (see keystore_base64.txt artifact)       │"
          echo "│ KEYSTORE_PASSWORD    │ (the password you entered)               │"
          echo "│ KEY_ALIAS            │ ${{ inputs.key_alias }}                  │"
          echo "│ KEY_PASSWORD         │ (same as KEYSTORE_PASSWORD)              │"
          echo "└─────────────────────────────────────────────────────────────────┘"
          echo ""
          echo "⚠️  IMPORTANT: Download and backup the keystore artifact!"
          echo "    If you lose it, you won't be able to update your app!"
          echo ""
          echo "=========================================="

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: syndro-keystore
          path: |
            syndro-release.jks
            keystore_base64.txt
            keystore_password.txt
            key_alias.txt
          retention-days: 1

      - name: Output Secrets (for easy copying)
        run: |
          echo "### 🔐 GitHub Secrets to Add" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Go to: **Settings → Secrets and variables → Actions → New repository secret**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_BASE64\` | \`\`\`$(cat keystore_base64.txt)\`\`\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_PASSWORD\` | \`\`\`The password you entered\`\`\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEY_ALIAS\` | \`\`\`$(cat key_alias.txt)\`\`\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEY_PASSWORD\` | \`\`\`Same as KEYSTORE_PASSWORD\`\`\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Important" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **Download the artifact** and backup \`syndro-release.jks\` securely" >> $GITHUB_STEP_SUMMARY
          echo "2. **Delete this workflow run** after saving secrets (to remove keystore from logs)" >> $GITHUB_STEP_SUMMARY
          echo "3. **Never commit the keystore file** to the repository" >> $GITHUB_STEP_SUMMARY
