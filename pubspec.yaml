name: syndro
description: A lightning-fast, privacy-first cross-platform file sharing platform
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.2.0
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Network & Discovery
  network_info_plus: ^5.0.1

  # HTTP Client
  http: ^1.1.2

  # File System
  path_provider: ^2.1.1
  file_picker: ^6.1.1

  # Permissions
  permission_handler: ^11.1.0

  # QR Code
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Utilities
  intl: ^0.19.0
  path: ^1.8.3
  uuid: ^4.2.2
  equatable: ^2.0.5

  # Database & History
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4

  # File Previews
  cached_network_image: ^3.3.0

  # Animations
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
